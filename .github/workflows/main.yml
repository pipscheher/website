name: Deploy to neocities

# only run on changes to main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEOCITIES_USERNAME: ${{ secrets.NEOCITIES_USERNAME }}
      NEOCITIES_API_TOKEN: ${{ secrets.NEOCITIES_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Build public folder
        run: |
          rm -rf public
          mkdir public
          rsync -av --exclude='.git' --exclude='.github' --exclude='.neocitiesignore' ./ public/

      - name: Install neocities-cli
        run: npm install -g neocities-cli

      - name: Deploy to neocities via CLI
        run: |
          ls -la public
          neocities-cli push public --username "$NEOCITIES_USERNAME" --password "$NEOCITIES_API_TOKEN"
          neocities-cli info --username "$NEOCITIES_USERNAME" --password "$NEOCITIES_API_TOKEN"

